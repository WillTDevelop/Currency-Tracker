<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Live exchange rates</p>
          <h1>Track money-to-money prices in a clean dashboard.</h1>
          <p class="hero-text">
            Pick two currencies, enter an amount, and get the latest conversion rate
            from a live API.
          </p>
        </div>

        <div class="hero-stats">
          <div class="stat-card">
            <span class="stat-label">Current rate</span>
            <strong id="currentRate">--</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Last updated</span>
            <strong id="lastUpdated">Waiting for data</strong>
          </div>
        </div>
      </section>

      <section class="converter-card">
        <form id="converterForm" class="converter-form">
          <label class="field">
            <span>Amount</span>
            <input id="amountInput" type="number" min="0" step="0.01" value="1" />
          </label>

          <label class="field">
            <span>From</span>
            <select id="fromCurrency"></select>
          </label>

          <button id="swapButton" class="swap-button" type="button" aria-label="Swap currencies">
            Swap
          </button>

          <label class="field">
            <span>To</span>
            <select id="toCurrency"></select>
          </label>

          <button class="primary-button" type="submit">Refresh price</button>
        </form>

        <div class="result-panel">
          <p class="result-label">Converted amount</p>
          <p id="conversionResult" class="result-value">--</p>
          <p id="statusMessage" class="status-message">Loading currencies...</p>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
